<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商户登录 - 黑金PAY</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* ===== 黑金流光全局滚动条 ===== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f0f0f; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #f0d77a, #d4af37);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #fff5cc, #f0d77a); }
  * { scrollbar-width: thin; scrollbar-color: #d4af37 #0f0f0f; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    font-weight: bold;
    background: #070707;
    color: #e0d8c8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* 黑金流光背景 */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(212,175,55,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180,140,30,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(255,215,0,0.05) 0%, transparent 40%);
    animation: bgFlow 18s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes bgFlow {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(-2%, 2%); }
    66% { transform: translate(2%, -1%); }
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 400px;
    max-width: 92vw;
    background: linear-gradient(145deg, rgba(20,18,10,0.95), rgba(26,24,14,0.95));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow:
      0 24px 80px rgba(0,0,0,0.7),
      0 0 40px rgba(212,175,55,0.06),
      inset 0 1px 0 rgba(212,175,55,0.08);
    animation: cardIn 0.35s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .login-logo {
    width: 64px; height: 64px;
    border-radius: 16px;
    border: 2px solid rgba(212,175,55,0.4);
    box-shadow: 0 4px 24px rgba(212,175,55,0.15);
    margin: 0 auto 16px;
    display: block;
  }
  .login-brand {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #f0d77a, #d4af37, #b8860b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .login-sub {
    text-align: center;
    font-size: 11px;
    color: rgba(212,175,55,0.45);
    letter-spacing: 3px;
    margin-bottom: 32px;
  }
  .login-title {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: #f0d77a;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    color: rgba(212,175,55,0.6);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #f0d77a;
    outline: none;
    font-family: inherit;
    font-weight: 700;
    transition: all 0.25s;
  }
  .form-input:focus {
    border-color: #d4af37;
    box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
  }
  .form-input::placeholder {
    color: rgba(212,175,55,0.25);
    font-weight: 400;
  }

  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, #c99c2c 0%, #d4af37 50%, #b8860b 100%);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(212,175,55,0.25);
    margin-top: 8px;
  }
  .login-btn:hover {
    box-shadow: 0 6px 30px rgba(212,175,55,0.4);
    transform: translateY(-1px);
  }
  .login-btn:active {
    transform: translateY(0);
  }
  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .login-error {
    background: rgba(244,67,54,0.1);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ef9a9a;
    margin-bottom: 16px;
    letter-spacing: 1px;
    display: none;
  }
  .login-error.show {
    display: block;
  }

  .login-hint {
    text-align: center;
    font-size: 11px;
    color: rgba(212,175,55,0.35);
    margin-top: 24px;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* 密码输入框小眼睛 */
  .pwd-input-wrap { position: relative; }
  .pwd-input-wrap .form-input { padding-right: 44px; }
  .pwd-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    cursor: pointer;
    color: rgba(212,175,55,0.45);
    user-select: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pwd-eye:hover { color: #d4af37; }
  .pwd-eye svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="login-card">
  <img class="login-logo" src="logo-pay.png" alt="黑金PAY">
  <div class="login-brand">黑金PAY</div>
  <div class="login-sub">HEIJIN PAY</div>

  <div class="login-title">商户登录</div>

  <div class="login-error" id="loginError"></div>

  <div class="form-group">
    <label class="form-label">手机号</label>
    <input type="tel" class="form-input" id="inputPhone" placeholder="请输入绑定的手机号" maxlength="11" autocomplete="off">
  </div>

  <div class="form-group">
    <label class="form-label">登录密码</label>
    <div class="pwd-input-wrap">
      <input type="password" class="form-input" id="inputPassword" placeholder="请输入登录密码" autocomplete="off"
        onkeydown="if(event.key==='Enter')submitLogin()">
      <span class="pwd-eye" onclick="togglePwdVisibility('inputPassword', this)" title="显示/隐藏密码">
        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <svg class="eye-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
      </span>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="submitLogin()">登 录</button>

  <div class="login-hint">
    登录即代表同意商户服务协议
  </div>
</div>

<script>
const TOKEN_KEY = 'heijin_merchant_token';

// 页面加载时检查是否已登录
(function() {
  const token = sessionStorage.getItem(TOKEN_KEY);
  if (token) {
    // 验证 token 有效性
    fetch('/api/login/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': token }
    }).then(r => r.json()).then(json => {
      if (json.code === 'OK') {
        location.href = 'admin.html';
      } else {
        sessionStorage.removeItem(TOKEN_KEY);
      }
    }).catch(() => {});
  }
})();

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('loginError').classList.remove('show');
}

function togglePwdVisibility(inputId, eyeEl) {
  const input = document.getElementById(inputId);
  const open = eyeEl.querySelector('.eye-open');
  const close = eyeEl.querySelector('.eye-close');
  if (input.type === 'password') {
    input.type = 'text';
    if (open) open.style.display = 'none';
    if (close) close.style.display = 'block';
  } else {
    input.type = 'password';
    if (open) open.style.display = 'block';
    if (close) close.style.display = 'none';
  }
}

async function submitLogin() {
  hideError();
  const phone = document.getElementById('inputPhone').value.trim();
  const password = document.getElementById('inputPassword').value;
  const btn = document.getElementById('loginBtn');

  if (!phone || !/^1\d{10}$/.test(phone)) {
    showError('请输入有效的 11 位手机号');
    return;
  }
  if (!password) {
    showError('请输入登录密码');
    return;
  }

  btn.disabled = true;
  btn.textContent = '登录中...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password })
    });
    const json = await res.json();

    if (json.code === 'OK') {
      // 存储 token
      const token = json.token || sessionStorage.getItem(TOKEN_KEY) || '';
      sessionStorage.setItem(TOKEN_KEY, token);
      // 跳转到后台
      location.href = 'admin.html';
    } else {
      showError(json.message || '手机号或密码错误');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  } catch (e) {
    showError('网络错误：' + e.message);
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}
</script>

</body>
</html>
