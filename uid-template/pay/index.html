<!DOCTYPE html>

<head>

<title>收银台 - 黑金PAY</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:#070707; color:#d4af37; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; flex-direction:column; padding:24px; }
  .tip { text-align:center; max-width:320px; }

  .tip-desc { font-size:13px; color:rgba(255,255,255,0.35); line-height:1.8; }
</style>
</head>
<body>
  <div class="tip">
    <div class="tip-icon">&#x1f4f1;</div>
    <div class="tip-title">请使用支付宝扫码</div>

  </div>
