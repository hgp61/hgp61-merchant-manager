<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>黑金PAY · 收款</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:#070707; color:#d4af37; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; flex-direction:column; padding:24px; -webkit-tap-highlight-color:transparent; }
  .tip { text-align:center; max-width:320px; }
  .tip-icon { font-size:48px; margin-bottom:20px; }
  .tip-title { font-size:20px; font-weight:800; letter-spacing:2px; margin-bottom:12px; background:linear-gradient(135deg,#f0d77a,#d4af37); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .tip-desc { font-size:13px; color:rgba(255,255,255,0.35); line-height:1.8; }
</style>
</head>
<body>
  <div class="tip" id="tip">
    <div class="tip-icon">📱</div>
    <div class="tip-title">请使用支付宝扫码</div>
    <div class="tip-desc">为保护交易安全<br>请在支付宝中扫描此二维码</div>
  </div>

<script>
(function() {
  // UA 检测：支付宝浏览器直接跳转 alipays://
  var ua = navigator.userAgent || '';
  var isAlipay = /AlipayClient|alipay/i.test(ua);
  if (!isAlipay) return;  // 非支付宝，显示提示页

  // 支付宝浏览器：解析 URL 参数，构造 alipays:// 链接并跳转
  var params = new URLSearchParams(window.location.search);
  var amount = params.get('amount') || '';
  var uid = params.get('uid') || '';
  var memo = params.get('memo') || '';

  if (!amount || !uid) return;

  var biz = JSON.stringify({ s:'money', u:uid, a:parseFloat(amount).toFixed(2), m:memo });
  var ebiz = encodeURIComponent(biz);
  var alipaysUrl = 'alipays://platformapi/startapp?appId=20000123&actionType=scan&biz_data=' + ebiz;

  // 直接跳转
  window.location.href = alipaysUrl;
})();
</script>
</body>
</html>
